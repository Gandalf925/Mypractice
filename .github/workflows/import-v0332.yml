name: Import FRONTLINE ROADS v0.33.2

on:
  push:
    branches:
      - codex/v0-33-2-canonical-upload
    paths:
      - .github/workflows/import-v0332.yml

permissions:
  contents: write

jobs:
  import:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out staging branch
        uses: actions/checkout@v4
        with:
          ref: codex/v0-33-2-canonical-upload
          fetch-depth: 0

      - name: Reconstruct v0.33.2
        shell: bash
        run: |
          set -euo pipefail
          cat .frontline-import/v0332/part-*.b64 | base64 --decode > /tmp/v0332-runtime.tar.gz
          echo '1f68a3491622232f4d21e53e2beb5a9dea1f894505ee9b8654282df1827a038f  /tmp/v0332-runtime.tar.gz' | sha256sum -c -
          tar -xzf /tmp/v0332-runtime.tar.gz -C .

          cat .frontline-import/v0332-validation/part-*.b64 | base64 --decode > /tmp/v0332-validation.tar.gz
          echo '704aaef5d6419503acec4638558c7fce44b1cb9e440e334bfc5b6f244dbf7aff  /tmp/v0332-validation.tar.gz' | sha256sum -c -
          tar -xzf /tmp/v0332-validation.tar.gz -C .

          test "$(node -p "require('./frontline-roads/package.json').version")" = '0.33.2'
          grep -q 'entry=0.33.2' index.html
          grep -q 'entry=0.33.2' fr/index.html
          grep -q 'frontline-roads-v0-33-2-tactical-build-performance' frontline-roads/sw.js

      - name: Run full verification
        working-directory: frontline-roads
        run: npm run verify

      - name: Replace staging payload with verified release
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .frontline-import
          rm -f .github/workflows/import-v0332.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'v0.33.2'
          git push origin HEAD:codex/v0-33-2-canonical-upload
