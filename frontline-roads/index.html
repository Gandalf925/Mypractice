<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0d1219">
  <meta name="frontline-build" content="0.12.0-audited-single-html">
  <title>FRONTLINE ROADS</title>
  <style>
    html,body{width:100%;height:100%;margin:0;background:#0d1219;color:#f5f7fa;font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif}
    body{display:grid;place-items:center}
    main{width:min(520px,calc(100% - 32px));padding:24px;border:1px solid #ffffff1c;border-radius:20px;background:#141b25;text-align:center;box-sizing:border-box}
    strong{display:block;margin-bottom:10px;font-size:20px}
    p{margin:0;color:#a7b3c2;line-height:1.6}
    .error{color:#ff9b9b}
  </style>
</head>
<body>
  <main><strong>FRONTLINE ROADS</strong><p id="status">最新版を読み込んでいます…</p></main>
  <script>
  (async()=>{
    const status=document.getElementById('status');
    const base='https://raw.githubusercontent.com/Gandalf925/Mypractice/main/.frontline-upload/';
    const names=Array.from({length:10},(_,i)=>`part${String(i).padStart(2,'0')}`);
    const parts=await Promise.all(names.map(async name=>{
      const response=await fetch(base+name,{cache:'no-store'});
      if(!response.ok) throw new Error(`${name}: HTTP ${response.status}`);
      return response.text();
    }));
    if(!('DecompressionStream' in globalThis)) throw new Error('このブラウザは圧縮データの展開に対応していません。');
    const encoded=parts.join('').replace(/\s+/g,'');
    const binary=atob(encoded);
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
    const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
    const html=await new Response(stream).text();
    if(!html.includes('0.12.0-audited-single-html')||!html.trimEnd().endsWith('</html>')) throw new Error('公開データの検証に失敗しました。');
    status.textContent='起動しています…';
    document.open();
    document.write(html);
    document.close();
  })().catch(error=>{
    console.error(error);
    const status=document.getElementById('status');
    status.className='error';
    status.textContent=`起動に失敗しました：${error.message} ページを再読み込みしてください。`;
  });
  </script>
</body>
</html>
