<body>
  <main id="app">
    <canvas id="mapCanvas" aria-label="道路地図"></canvas>

    <header id="statusBar">
      <span>FRONTLINE ROADS</span>
      <span id="lifecycleText">BOOT</span>
    </header>

    <section id="basePlacementOverlay" class="overlay">
      <div class="panel">
        <div class="panelHeader">
          <p class="eyebrow">初回拠点設置</p>
          <h1>1km以内の道路を直接選択</h1>
          <p>候補一覧、現地移動、50m判定、30秒滞在はありません。現在地周辺の道路を一度だけ取得し、選んだ道路で即時開始します。</p>
        </div>
        <div class="mapControls" aria-label="地図操作">
          <button id="zoomIn" type="button">＋</button>
          <button id="zoomOut" type="button">−</button>
          <button id="recenter" type="button">◎</button>
        </div>
        <div class="panelFooter">
          <p id="basePlacementStatus" role="status">初期化しています…</p>
          <button id="confirmBase" class="primary" type="button" disabled>この道路に拠点を設置</button>
          <button id="retryLocation" class="secondary" type="button">位置情報と道路を再取得</button>
          <small>正確な現在地履歴は保存しません。拠点確定後は同じ道路グラフをゲーム本体で使用します。</small>
        </div>
      </div>
    </section>

    <section id="playingHud" class="gameUi" hidden>
      <div class="combatStats">
        <span>都市 <strong id="cityHp">100</strong></span>
        <span>資材 <strong id="scrapValue">250</strong></span>
        <span>敵 <strong id="enemyCount">0</strong></span>
      </div>
      <div id="baseSummary" class="baseSummary">拠点設置済み</div>
      <div id="combatTools" class="combatTools" aria-label="防衛設備"></div>
      <button id="resetGame" class="resetButton" type="button">ゲームを初期化</button>
    </section>

    <div id="notification" class="notification" role="status"></div>
    <footer>開発版 <span id="versionText"></span></footer>
  </main>
